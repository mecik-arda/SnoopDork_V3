<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DorkForge</title>
<style>
:root {
    --bg-main: #0a0a0f;
    --bg-card: #111118;
    --bg-input: #1a1a24;
    --text-main: #e0e0e0;
    --text-muted: #888899;
    --neon-green: #00ff88;
    --neon-cyan: #00d4ff;
    --neon-red: #ff3366;
    --border-color: #2a2a35;
    --btn-hover: #16161e;
    --font-ui: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', Courier, monospace;
}
body.light-mode {
    --bg-main: #f4f4f9;
    --bg-card: #ffffff;
    --bg-input: #eaeaef;
    --text-main: #111118;
    --text-muted: #555566;
    --border-color: #d1d1e0;
    --btn-hover: #eaeaef;
}
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: var(--font-ui);
    line-height: 1.6;
    padding: 2rem;
    min-height: 100vh;
    transition: background-color 0.3s ease, color 0.3s ease;
}
.top-controls {
    position: absolute;
    top: 1rem;
    right: 2rem;
    display: flex;
    gap: 0.5rem;
}
.control-btn {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.3s ease;
}
.control-btn:hover {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
}
header {
    text-align: center;
    margin-bottom: 3rem;
    margin-top: 2rem;
}
h1 {
    font-size: 3rem;
    color: var(--neon-green);
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
    margin-bottom: 0.5rem;
}
.tagline {
    color: var(--text-muted);
    font-size: 1.1rem;
}
.input-container {
    max-width: 600px;
    margin: 0 auto 2rem auto;
    display: flex;
    gap: 1rem;
    position: relative;
}
input[type="text"] {
    flex: 1;
    background-color: var(--bg-input);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 1rem 1.5rem;
    font-size: 1.1rem;
    border-radius: 8px;
    outline: none;
    transition: all 0.3s ease;
    font-family: var(--font-mono);
}
input[type="text"]:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}
button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 1rem;
    transition: all 0.3s ease;
    font-family: var(--font-ui);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}
.btn-primary {
    background-color: var(--neon-green);
    color: #0a0a0f;
    padding: 1rem 2rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.btn-primary:hover {
    background-color: #00cc6a;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
}
.btn-secondary {
    background-color: transparent;
    color: var(--neon-cyan);
    border: 1px solid var(--neon-cyan);
    padding: 0.5rem 1rem;
}
.btn-secondary:hover {
    background-color: rgba(0, 212, 255, 0.1);
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
}
.btn-action {
    background-color: var(--bg-input);
    color: var(--text-main);
    border: 1px solid var(--border-color);
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
}
.btn-action:hover {
    background-color: var(--btn-hover);
    border-color: var(--text-muted);
}
.warning-box {
    display: none;
    max-width: 600px;
    margin: -1rem auto 2rem auto;
    padding: 1rem;
    background-color: rgba(255, 51, 102, 0.1);
    border: 1px solid var(--neon-red);
    color: var(--neon-red);
    border-radius: 8px;
    text-align: center;
}
.dashboard-actions {
    display: none;
    max-width: 1200px;
    margin: 0 auto 2rem auto;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    background-color: var(--bg-card);
    border-radius: 8px;
    border: 1px solid var(--border-color);
    transition: all 0.3s ease;
}
.stats {
    color: var(--neon-cyan);
    font-weight: 500;
}
.global-buttons {
    display: flex;
    gap: 1rem;
}
.results-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 2rem;
}
.category-card {
    background-color: var(--bg-card);
    border-radius: 8px;
    padding: 1.5rem;
    border: 1px solid var(--border-color);
    border-left: 4px solid var(--neon-cyan);
    animation: fadeIn 0.5s ease forwards;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s ease;
}
.category-card:nth-child(odd) {
    border-left-color: var(--neon-green);
}
@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
.category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border-color);
}
.category-title {
    font-size: 1.25rem;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 0.75rem;
}
.badge {
    background-color: rgba(0, 212, 255, 0.1);
    color: var(--neon-cyan);
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
}
.category-card:nth-child(odd) .badge {
    background-color: rgba(0, 255, 136, 0.1);
    color: var(--neon-green);
}
.dork-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    padding: 0.75rem;
    background-color: var(--bg-main);
    border-radius: 6px;
    border: 1px solid transparent;
    transition: all 0.2s ease;
}
.dork-row:hover {
    border-color: var(--border-color);
}
.dork-text {
    flex: 1;
    font-family: var(--font-mono);
    color: var(--text-main);
    font-size: 0.95rem;
    word-break: break-all;
    user-select: all;
    position: relative;
    cursor: help;
}
.dork-text[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 110%;
    left: 0;
    background-color: var(--bg-input);
    color: var(--neon-cyan);
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--neon-cyan);
    font-family: var(--font-ui);
    font-size: 0.85rem;
    white-space: nowrap;
    z-index: 100;
    box-shadow: 0 4px 10px rgba(0, 212, 255, 0.15);
    pointer-events: none;
}
.dork-actions {
    display: flex;
    gap: 0.5rem;
}
.stealth-mode .dork-text,
.stealth-mode input[type="text"],
.stealth-mode .stats {
    filter: blur(8px);
    transition: filter 0.3s ease;
    user-select: none;
}
.stealth-mode .dork-text:hover,
.stealth-mode input[type="text"]:focus,
.stealth-mode .stats:hover {
    filter: blur(0);
    user-select: all;
}
@media (max-width: 768px) {
    .input-container {
        flex-direction: column;
    }
    .dashboard-actions {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
    }
    .dork-row {
        flex-direction: column;
        align-items: stretch;
    }
    .dork-actions {
        justify-content: flex-end;
    }
    .top-controls {
        top: 0.5rem;
        right: 0.5rem;
    }
}
</style>
</head>
<body>

<div class="top-controls">
    <button id="themeToggleBtn" class="control-btn" title="Toggle Theme">☀️</button>
    <button id="stealthToggleBtn" class="control-btn" title="Toggle Stealth Mode">👁️</button>
</div>

<header>
    <h1>⚒ DorkForge</h1>
    <div class="tagline">Hedef Odaklı OSINT Dork Üretici</div>
</header>

<div class="input-container">
    <input type="text" id="targetInput" placeholder="hedef.com" autofocus>
    <button id="generateButton" class="btn-primary">Dork Üret</button>
</div>

<div id="warningMessage" class="warning-box">Lütfen geçerli bir hedef domain giriniz.</div>

<div id="dashboardActions" class="dashboard-actions">
    <div id="statsContainer" class="stats"></div>
    <div class="global-buttons">
        <button id="copyAllButton" class="btn-secondary">📋 Tümünü Kopyala</button>
        <button id="downloadButton" class="btn-secondary">💾 Tümünü TXT Olarak İndir</button>
    </div>
</div>

<div id="resultsContainer" class="results-grid"></div>

<script>
const themeToggleBtnElement = document.getElementById("themeToggleBtn");
const stealthToggleBtnElement = document.getElementById("stealthToggleBtn");

themeToggleBtnElement.addEventListener("click", function() {
    document.body.classList.toggle("light-mode");
    if (document.body.classList.contains("light-mode")) {
        themeToggleBtnElement.textContent = "🌙";
    } else {
        themeToggleBtnElement.textContent = "☀️";
    }
});

stealthToggleBtnElement.addEventListener("click", function() {
    document.body.classList.toggle("stealth-mode");
    if (document.body.classList.contains("stealth-mode")) {
        stealthToggleBtnElement.textContent = "🕶️";
    } else {
        stealthToggleBtnElement.textContent = "👁️";
    }
});

            { q: 'site:{domain} ext:pptx inurl:strategy', d: 'Strateji ve planlama içeren sunum dosyalarını bulur' },
            { q: 'site:{domain} filetype:pdf "confidential"', d: 'Metin içeriğinde gizli ibaresi geçen PDF\'leri arar' },
            { q: 'site:{domain} filetype:doc "not for distribution"', d: 'Dağıtımı yasaklanmış hassas word dökümanlarını bulur' }
        ]
    },
    {
        title: "🖼️ Görsel Kanıt Keşfi",
        type: "google",
        templates: [
            { q: 'site:{domain} intitle:"confidential" OR "strictly private"', d: 'Gizlilik ibaresi taşıyan doküman ve indeksleri arar' },
            { q: 'site:{domain} filetype:jpg OR filetype:png inurl:confidential', d: 'Gizli dizinlerde unutulmuş PNG/JPG görselleri tespit eder' },
            { q: 'site:{domain} filetype:jpg OR filetype:png inurl:internal', d: 'Kurum içi (internal) dizinlerde yer alan fotoğrafları arar' }
        ]
    }
];

const targetInputElement = document.getElementById("targetInput");
const generateButtonElement = document.getElementById("generateButton");
const warningMessageElement = document.getElementById("warningMessage");
const dashboardActionsElement = document.getElementById("dashboardActions");
const statsContainerElement = document.getElementById("statsContainer");
const resultsContainerElement = document.getElementById("resultsContainer");
const copyAllButtonElement = document.getElementById("copyAllButton");
const downloadButtonElement = document.getElementById("downloadButton");

let generatedDataState = [];
let currentDomainState = "";

targetInputElement.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        executeGeneration();
    }
});

generateButtonElement.addEventListener("click", executeGeneration);

copyAllButtonElement.addEventListener("click", function() {
    let allTextCombined = "";
    generatedDataState.forEach(function(category) {
        category.dorks.forEach(function(dorkText) {
            allTextCombined += dorkText + "\n";
        });
    });
    performCopyOperation(allTextCombined, copyAllButtonElement, "📋 Tümünü Kopyala");
});

downloadButtonElement.addEventListener("click", function() {
    let fileContentString = "";
    generatedDataState.forEach(function(category) {
        fileContentString += "=== " + category.title + " ===\n";
        category.dorks.forEach(function(dorkText) {
            fileContentString += dorkText + "\n";
        });
        fileContentString += "\n";
    });
    
    const currentDate = new Date().toISOString().split("T")[0];
    const fileNameString = currentDomainState + "_dorks_" + currentDate + ".txt";
    
    const blobObject = new Blob([fileContentString], { type: "text/plain;charset=utf-8" });
    const downloadAnchor = document.createElement("a");
    const objectUrl = URL.createObjectURL(blobObject);
    
    downloadAnchor.href = objectUrl;
    downloadAnchor.download = fileNameString;
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    document.body.removeChild(downloadAnchor);
    URL.revokeObjectURL(objectUrl);
});

function executeGeneration() {
    const rawInputValue = targetInputElement.value.trim();
    if (!rawInputValue) {
        warningMessageElement.style.display = "block";
        dashboardActionsElement.style.display = "none";
        resultsContainerElement.innerHTML = "";
        return;
    }
    
    const cleanedDomainValue = rawInputValue.replace(/^(https?:\/\/)?(www\.)?/, "").replace(/\/.*$/, "");
    if (!cleanedDomainValue) {
        warningMessageElement.style.display = "block";
        dashboardActionsElement.style.display = "none";
        resultsContainerElement.innerHTML = "";
        return;
    }
    
    warningMessageElement.style.display = "none";
    currentDomainState = cleanedDomainValue;
    generatedDataState = [];
    resultsContainerElement.innerHTML = "";
    
    let totalDorkCountNumber = 0;
    
    categoryDefinitions.forEach(function(categoryDef, index) {
        const categoryResultObject = {
            title: categoryDef.title,
            type: categoryDef.type,
            dorks: []
        };
        
        const categoryCardElement = document.createElement("div");
        categoryCardElement.className = "category-card";
        categoryCardElement.style.animationDelay = (index * 0.1) + "s";
        
        const categoryHeaderElement = document.createElement("div");
        categoryHeaderElement.className = "category-header";
        
        const titleElement = document.createElement("h2");
        titleElement.className = "category-title";
        titleElement.innerHTML = categoryDef.title;
        
        const badgeElement = document.createElement("span");
        badgeElement.className = "badge";
        badgeElement.textContent = categoryDef.templates.length + " dork";
        titleElement.appendChild(badgeElement);
        
        const copyCategoryButtonElement = document.createElement("button");
        copyCategoryButtonElement.className = "btn-secondary";
        copyCategoryButtonElement.textContent = "📑 Tüm Kategorideki Dorkları Kopyala";
        
        categoryHeaderElement.appendChild(titleElement);
        categoryHeaderElement.appendChild(copyCategoryButtonElement);
        categoryCardElement.appendChild(categoryHeaderElement);
        
        categoryDef.templates.forEach(function(templateObj) {
            const finalDorkString = templateObj.q.replace(/{domain}/g, cleanedDomainValue);
            categoryResultObject.dorks.push(finalDorkString);
            totalDorkCountNumber++;
            
            const rowElement = document.createElement("div");
            rowElement.className = "dork-row";
            
            const textElement = document.createElement("div");
            textElement.className = "dork-text";
            textElement.textContent = finalDorkString;
            
            if (templateObj.d) {
                textElement.setAttribute("data-tooltip", templateObj.d);
            }
            
            const actionsElement = document.createElement("div");
            actionsElement.className = "dork-actions";
            
            const copyDorkButtonElement = document.createElement("button");
            copyDorkButtonElement.className = "btn-action";
            copyDorkButtonElement.textContent = "Kopyala";
            copyDorkButtonElement.addEventListener("click", function() {
                performCopyOperation(finalDorkString, copyDorkButtonElement, "Kopyala");
            });
            
            const searchButtonElement = document.createElement("button");
            searchButtonElement.className = "btn-action";
            if (categoryDef.type === "direct") {
                searchButtonElement.textContent = "Aç";
            } else {
                searchButtonElement.textContent = "Ara";
            }
            
            searchButtonElement.addEventListener("click", function() {
                let targetSearchUrl = "";
                if (categoryDef.type === "shodan") {
                    targetSearchUrl = "https://www.shodan.io/search?query=" + encodeURIComponent(finalDorkString);
                } else if (categoryDef.type === "direct") {
                    targetSearchUrl = finalDorkString;
                } else {
                    targetSearchUrl = "https://www.google.com/search?q=" + encodeURIComponent(finalDorkString);
                }
                window.open(targetSearchUrl, "_blank");
            });
            
            actionsElement.appendChild(copyDorkButtonElement);
            actionsElement.appendChild(searchButtonElement);
            
            rowElement.appendChild(textElement);
            rowElement.appendChild(actionsElement);
            categoryCardElement.appendChild(rowElement);
        });
        
        copyCategoryButtonElement.addEventListener("click", function() {
            let categoryTextCombined = categoryResultObject.dorks.join("\n");
            performCopyOperation(categoryTextCombined, copyCategoryButtonElement, "📑 Tüm Kategorideki Dorkları Kopyala");
        });
        
        resultsContainerElement.appendChild(categoryCardElement);
        generatedDataState.push(categoryResultObject);
    });
    
    statsContainerElement.textContent = "Toplam " + totalDorkCountNumber + " sorgu üretildi | " + categoryDefinitions.length + " kategori | Hedef: " + cleanedDomainValue;
    dashboardActionsElement.style.display = "flex";
}

function performCopyOperation(textToCopy, buttonReference, originalButtonText) {
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(textToCopy).then(function() {
            triggerCheckmark(buttonReference, originalButtonText);
        });
    } else {
        const fallbackTextArea = document.createElement("textarea");
        fallbackTextArea.value = textToCopy;
        fallbackTextArea.style.position = "fixed";
        fallbackTextArea.style.left = "-999999px";
        fallbackTextArea.style.top = "-999999px";
        document.body.appendChild(fallbackTextArea);
        fallbackTextArea.focus();
        fallbackTextArea.select();
        try {
            document.execCommand("copy");
            triggerCheckmark(buttonReference, originalButtonText);
        } catch (error) {
        }
        document.body.removeChild(fallbackTextArea);
    }
}

function triggerCheckmark(buttonReference, originalTextValue) {
    buttonReference.innerHTML = "✓ Kopyalandı";
    buttonReference.style.color = "var(--neon-green)";
    buttonReference.style.borderColor = "var(--neon-green)";
    
    setTimeout(function() {
        buttonReference.textContent = originalTextValue;
        buttonReference.style.color = "";
        buttonReference.style.borderColor = "";
    }, 2000);
}
</script>
